spring.application.name=catalog_service
server.port=8081

# Credenciales definidas previamente en el docker-compose
spring.datasource.url=jdbc:mysql://db_catalog:3306/catalog_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=desarrollador
spring.datasource.password=password_seguro_123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate para crear tablas automáticamente en base al código
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Tiempo máximo para conectar al servicio destino (3 segundos)
spring.cloud.openfeign.client.config.default.connectTimeout=15000

# Tiempo máximo para leer la respuesta (5 segundos)
spring.cloud.openfeign.client.config.default.readTimeout=15000