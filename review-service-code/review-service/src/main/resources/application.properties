spring.application.name=review_service
server.port=8088

# Conexión a la base de datos compartida
spring.datasource.url=jdbc:mysql://db_review:3306/review_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=desarrollador
spring.datasource.password=password_seguro_123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate: Crea la tabla 'review' automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Conexiones a otros microservicios
catalog.service.url=http://catalog-service-container:8081
user.service.url=${USERS_URL:http://localhost:8080}

# Tiempo máximo para conectar al servicio destino (15 segundos)
spring.cloud.openfeign.client.config.default.connectTimeout=15000

# Tiempo máximo para leer la respuesta (15 segundos)
spring.cloud.openfeign.client.config.default.readTimeout=15000